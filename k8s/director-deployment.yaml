apiVersion: apps/v1
kind: Deployment
metadata:
  name: skulls-ludo-director
  labels:
    app: skulls-ludo-director
    component: matchmaker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skulls-ludo-director
  template:
    metadata:
      labels:
        app: skulls-ludo-director
        component: matchmaker
    spec:
      containers:
        - name: director
          image: docker.io/library/skulls-ludo-matchmaker-director:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: Matchmaker__OpenMatch__BackendHost
              value: "open-match-backend.open-match.svc.cluster.local"
            - name: Matchmaker__OpenMatch__BackendPort
              value: "50505"
            - name: Matchmaker__OpenMatch__QueryHost
              value: "open-match-query.open-match.svc.cluster.local"
            - name: Matchmaker__OpenMatch__QueryPort
              value: "50503"
            - name: Matchmaker__OpenMatch__FrontendHost
              value: "open-match-frontend.open-match.svc.cluster.local"
            - name: Matchmaker__OpenMatch__FrontendPort
              value: "50504"
            - name: Matchmaker__MatchFunction__Host
              value: "skulls-ludo-matchfunction.default.svc.cluster.local"
            - name: Matchmaker__MatchFunction__Port
              value: "50502"
            - name: Matchmaker__Agones__AllocatorHost
              value: "agones-allocator.agones-system.svc.cluster.local"
            - name: Matchmaker__Agones__AllocatorPort
              value: "443"
            - name: Matchmaker__Agones__Namespace
              value: "default"
            - name: Matchmaker__Agones__FleetName
              value: "ludo-prod-fleet"
            - name: Matchmaker__Agones__ClientCertPath
              value: "/agones/certs/tls.crt"
            - name: Matchmaker__Agones__ClientKeyPath
              value: "/agones/certs/tls.key"
            - name: Matchmaker__Agones__ServerCaPath
              value: "/agones/ca/ca.crt"
            - name: Matchmaker__Agones__AllocationTimeoutSeconds
              value: "15"
            - name: Matchmaker__Director__LoopIntervalMs
              value: "5000"
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: allocator-client-tls
              mountPath: /agones/certs
              readOnly: true
            - name: allocator-server-ca
              mountPath: /agones/ca
              readOnly: true
            - name: queues-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        # Client cert + key used by the Director to authenticate to agones-allocator.
        # Create Secret `allocator-client-tls` (e.g. Helm or scripts/setup-allocator-mtls.ps1).
        - name: allocator-client-tls
          secret:
            secretName: allocator-client-tls
        # CA certificate of the allocator service for server-cert validation.
        - name: allocator-server-ca
          secret:
            secretName: allocator-server-ca
        # Shared queue catalogue (see k8s/queues-configmap.yaml). Optional: if absent,
        # services fall back to DefaultQueues.All in code.
        - name: queues-config
          configMap:
            name: skulls-ludo-queues
            optional: true
