apiVersion: v1
kind: ConfigMap
metadata:
  name: open-match-configmap-override
  namespace: open-match
  labels:
    app: open-match-customize
data:
  matchmaker_config_override.yaml: |
    api:
      evaluator:
        hostname: "skulls-ludo-evaluator.default.svc.cluster.local"
        grpcport: 50508
    synchronizer:
      enabled: true
      registrationIntervalMs: 1500
      proposalCollectionIntervalMs: 3000
    # Redis TTL on every ticket key. Default upstream is 43200 s (12 h). 1 hour is plenty
    # for Ludo: search ceiling is 2 min, the longest game is well under an hour, and a
    # tighter TTL keeps abandoned/timed-out tickets from accumulating in Redis.
    redis:
      expiration: 3600
