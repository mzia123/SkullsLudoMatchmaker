apiVersion: apps/v1
kind: Deployment
metadata:
  name: skulls-ludo-frontend
  labels:
    app: skulls-ludo-frontend
    component: matchmaker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skulls-ludo-frontend
  template:
    metadata:
      labels:
        app: skulls-ludo-frontend
        component: matchmaker
    spec:
      containers:
        - name: frontend
          image: docker.io/library/skulls-ludo-matchmaker-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: Matchmaker__OpenMatch__FrontendHost
              value: "open-match-frontend.open-match.svc.cluster.local"
            - name: Matchmaker__OpenMatch__FrontendPort
              value: "50504"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: queues-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        # Shared queue catalogue (see k8s/queues-configmap.yaml). Optional: if absent,
        # the Frontend falls back to DefaultQueues.All for queue validation.
        - name: queues-config
          configMap:
            name: skulls-ludo-queues
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: skulls-ludo-frontend
  labels:
    app: skulls-ludo-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: skulls-ludo-frontend
