apiVersion: apps/v1
kind: Deployment
metadata:
  name: skulls-ludo-matchfunction
  labels:
    app: skulls-ludo-matchfunction
    component: matchmaker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skulls-ludo-matchfunction
  template:
    metadata:
      labels:
        app: skulls-ludo-matchfunction
        component: matchmaker
    spec:
      containers:
        - name: matchfunction
          image: docker.io/library/skulls-ludo-matchmaker-matchfunction:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50502
              name: grpc
            - containerPort: 8080
              name: health
          env:
            - name: Matchmaker__OpenMatch__QueryHost
              value: "open-match-query.open-match.svc.cluster.local"
            - name: Matchmaker__OpenMatch__QueryPort
              value: "50503"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: queues-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        # Shared queue catalogue (see k8s/queues-configmap.yaml). Optional: if absent,
        # MatchFunction falls back to DefaultQueues.All for queue->strategy lookup.
        - name: queues-config
          configMap:
            name: skulls-ludo-queues
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: skulls-ludo-matchfunction
  labels:
    app: skulls-ludo-matchfunction
spec:
  type: ClusterIP
  ports:
    - port: 50502
      targetPort: 50502
      protocol: TCP
      name: grpc
  selector:
    app: skulls-ludo-matchfunction
