syntax = "proto3";
package openmatch;
option csharp_namespace = "OpenMatch";

import "messages.proto";

message EvaluateRequest {
  Match match = 1;
}

message EvaluateResponse {
  string match_id = 2;
}

service Evaluator {
  rpc Evaluate(stream EvaluateRequest) returns (stream EvaluateResponse);
}
