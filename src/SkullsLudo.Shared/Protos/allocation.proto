// Subset of Agones v1 allocation.proto sufficient for AllocationService.Allocate.
// Source: https://github.com/googleforgames/agones/blob/release-1.43.0/proto/allocation/allocation.proto
// Field numbers MUST match the upstream definition so the wire format stays compatible.
// Unused features (counters, lists, priorities, multi-cluster, deprecated fields) are intentionally
// omitted but their field numbers are reserved to avoid future collisions.

syntax = "proto3";

package allocation;
option csharp_namespace = "Agones.Allocation";
option go_package = "./allocation";

service AllocationService {
  rpc Allocate(AllocationRequest) returns (AllocationResponse);
}

message AllocationRequest {
  string namespace = 1;

  SchedulingStrategy scheduling = 5;
  enum SchedulingStrategy {
    Packed = 0;
    Distributed = 1;
  }

  // Metadata applied to the allocated GameServer. Visible to the game server
  // via the Agones SDK (GameServer.ObjectMeta.Annotations / Labels).
  MetaPatch metadata = 7;

  // Ordered list of GameServer label selectors. First match wins.
  repeated GameServerSelector gameServerSelectors = 8;

  // Reserved upstream field numbers (multi-cluster, deprecated selectors,
  // deprecated metaPatch, beta counters/lists/priorities).
  reserved 2, 3, 4, 6, 9, 10, 11;
}

message AllocationResponse {
  string gameServerName = 2;
  repeated GameServerStatusPort ports = 3;
  string address = 4;
  string nodeName = 5;
  string source = 6;

  // Upstream optional fields we don't consume but must reserve.
  reserved 7, 8, 9, 10;

  message GameServerStatusPort {
    string name = 1;
    int32 port = 2;
  }
}

message MetaPatch {
  map<string, string> labels = 1;
  map<string, string> annotations = 2;
}

message GameServerSelector {
  map<string, string> matchLabels = 1;

  enum GameServerState {
    READY = 0;
    ALLOCATED = 1;
  }
  GameServerState gameServerState = 2;

  // Upstream beta fields (players, counters, lists) intentionally omitted.
  reserved 3, 4, 5;
}
