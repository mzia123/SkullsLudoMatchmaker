syntax = "proto3";
package openmatch;
option csharp_namespace = "OpenMatch";

import "messages.proto";

message RunRequest {
  MatchProfile profile = 1;
}

message RunResponse {
  Match proposal = 1;
}

service MatchFunction {
  rpc Run(RunRequest) returns (stream RunResponse);
}
